name: Desktop

# Builds native desktop bundles for Linux, Windows, and macOS and attaches
# them to the GitHub Release for the tag. Runs alongside the Android workflow.
#
# Trigger: push a tag like `v0.1.0`, or run manually.
#
# NOTE (beta): Windows and macOS builds are currently UNSIGNED.
#   - Windows: SmartScreen may warn ("More info" → "Run anyway").
#   - macOS:   Gatekeeper blocks unsigned apps — right-click → Open, or run
#              `xattr -dr com.apple.quarantine "/Applications/Bread of Life.app"`.
# Proper code-signing (Apple Developer ID + notarization, Windows cert) is
# tracked in docs/ROADMAP.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: "appimage,deb"
            rust_target: ""
          - os: windows-latest
            bundles: "nsis"
            rust_target: ""
          - os: macos-latest
            bundles: "dmg"
            rust_target: "universal-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: System deps (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libappindicator3-dev patchelf file libxdo-dev libssl-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Rust
        run: rustup toolchain install stable --profile minimal

      - name: Extra Rust targets (macOS universal)
        if: matrix.rust_target == 'universal-apple-darwin'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      - run: pnpm install --frozen-lockfile

      - name: Build bundles
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        shell: bash
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            pnpm tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}
          else
            pnpm tauri build --bundles ${{ matrix.bundles }}
          fi

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p out
          find src-tauri/target -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' \
               -o -name '*-setup.exe' -o -name '*.msi' \) \
            -exec cp {} out/ \; 2>/dev/null || true
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: bread-of-life-${{ matrix.os }}
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
