name: 🐞 Bug report
description: Something isn't working right
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
  - type: input
    id: platform
    attributes:
      label: Platform & version
      placeholder: e.g. Android 15 · v0.1.1
